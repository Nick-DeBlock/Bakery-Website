<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/rbf7dxk.css">
<title>Order</title>

<style>
    body {
        margin: 0;
        font-family: 'Cormorant Garamond', serif;
    }

    header {
        background: #6b7a67;
        color: white;
        padding-right: 20px;

        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo img{
        width: 200px;
    }

    .order {
        background: #ffffff;
        padding: 5px 20px;
        border-radius: 5px;
        color: black;
    }

    nav a {
        color: white;
        margin-left: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        text-decoration: underline;
    }

    main {
        min-height: 80vh;
    }

    footer {
        background: #494949;
        color: white;
        text-align: center;
        padding: 10px;
    }

    /* This is the styling for the ad banner */

    .form {
        padding: 100px;
        max-width: 500px;
        margin: 0 auto; 
    }

</style>

<script>
    function closeBanner() {
        document.getElementById("ad-banner").classList.add("hidden");
    }
</script>

</head>

<body>

<header>
    <div class="logo"><img src="logo.png" alt="logo"></div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="order.html" class="order">Place an Order</a>
    </nav>
</header>

<main>
   <div class="form">
        <h1>
            Order Form
        </h1>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="order">Order Details:</label><br>
            <textarea id="order" name="order" rows="4" cols="50"></textarea><br><br>

            <input type="submit" value="Submit">
        </form>
           
    </div>

</main>

<footer>
    <p>© 2026 Chestnut Hill Bakery</p>
</footer>

</body>
</html>
