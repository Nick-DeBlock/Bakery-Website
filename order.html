<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    header {
        background: #88AB8E;
        color: white;
        padding: 40px 20px;

        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo {
        font-size: 20px;
        font-weight: bold;
    }

    .order {
        background: #ffffff;
        padding: 5px 20px;
        border-radius: 5px;
        color: black;
    }

    nav a {
        color: white;
        margin-left: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        text-decoration: underline;
    }

    main {
        min-height: 80vh;
    }

    footer {
        background: #494949;
        color: white;
        text-align: center;
        padding: 10px;
    }

    h1{
        font-size: 20px;
    }
 
    .form {
        padding: 100px;
        max-width: 500px;
        margin: 0 auto; 
    }

</style>
</head>

<body>

<header>
    <div class="logo">Chestnut Hill Bakery</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="order.html" class="order">Place an Order</a>
    </nav>
</header>

<main>
    <div class="form">
        <h1>
            Order Form
        </h1>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="order">Order Details:</label><br>
            <textarea id="order" name="order" rows="4" cols="50"></textarea><br><br>

            <input type="submit" value="Submit">
        </form>
           
    </div>

</main>

<footer>
    <p>© 2026 Chestnut Hill Bakery</p>
</footer>

</body>
</html>
